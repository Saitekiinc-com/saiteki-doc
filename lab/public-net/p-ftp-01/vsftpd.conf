# 教育目的: 意図的に脆弱なvsftpd設定

# 匿名ログインを許可
anonymous_enable=YES
anon_root=/var/ftp

# ローカルユーザーも許可
local_enable=YES
write_enable=YES

# パッシブモード設定
pasv_enable=YES
pasv_min_port=21100
pasv_max_port=21110

# セキュリティ設定を意図的に弱く
ssl_enable=NO
chroot_local_user=NO

# ログ
xferlog_enable=YES
vsftpd_log_file=/var/log/vsftpd.log

listen=YES
listen_ipv6=NO
