[global]
    workgroup = ACMECORP
    server string = ACME Backup Server
    security = user
    map to guest = bad user

# 教育目的: 認証なしの共有 (Guest読み取り可能)
[public]
    path = /backup
    browseable = yes
    writable = no
    guest ok = yes    # 認証不要 - 脆弱な設定

[private]
    path = /backup/databases
    browseable = yes
    writable = yes
    valid users = backupuser
