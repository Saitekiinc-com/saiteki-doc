; セキュリティ強化済み PHP 設定
; p-web-01 の脆弱な設定と比較して学習する

; コマンド実行関数を無効化 (コマンドインジェクション防止)
disable_functions = exec,passthru,shell_exec,system,proc_open,popen,curl_exec,curl_multi_exec,parse_ini_file,show_source

; ファイルアクセス制限
allow_url_fopen = Off          ; 外部URLをfopen()で読み込み禁止
allow_url_include = Off        ; リモートファイルのinclude禁止

; エラー情報の非表示 (情報漏洩防止)
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/log/php_errors.log

; セッションセキュリティ
session.cookie_httponly = On   ; JavaScriptからのCookieアクセス禁止
session.cookie_secure = On     ; HTTPS専用Cookie
session.use_strict_mode = On

; その他
expose_php = Off               ; PHPバージョン情報を非表示
