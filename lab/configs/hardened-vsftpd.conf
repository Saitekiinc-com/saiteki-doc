# セキュリティ強化済み vsftpd 設定
# p-ftp-01 の脆弱な設定と比較して学習する

# 匿名ログインを禁止
anonymous_enable=NO

# ローカルユーザーのみ許可
local_enable=YES
write_enable=NO           # 書き込みを禁止 (必要な場合のみYES)

# chrootでユーザーをホームディレクトリに閉じ込める
chroot_local_user=YES
allow_writeable_chroot=NO

# SSL/TLS を必須に
ssl_enable=YES
force_local_data_ssl=YES
force_local_logins_ssl=YES
ssl_tlsv1=YES
ssl_sslv2=NO
ssl_sslv3=NO

# パッシブモード設定
pasv_enable=YES
pasv_min_port=21100
pasv_max_port=21110

# ログ強化
xferlog_enable=YES
xferlog_std_format=YES
log_ftp_protocol=YES

# 接続制限
max_clients=10
max_per_ip=3

listen=YES
listen_ipv6=NO
